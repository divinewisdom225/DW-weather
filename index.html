<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyCast by Divine Wisdom</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: linear-gradient(to bottom, #1e3c72 0%, #2a5298 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            transition: background 1s ease;
        }

        .weather-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 90%;
            max-width: 380px;
            padding: 40px 20px;
            border-radius: 35px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }

        .search-box {
            display: flex;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 50px;
            padding: 5px 20px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        input {
            background: transparent;
            border: none;
            outline: none;
            color: white;
            padding: 12px;
            width: 100%;
            font-size: 16px;
        }

        .city { font-size: 26px; font-weight: 600; text-transform: uppercase; }
        .temp { font-size: 90px; font-weight: 200; margin: 5px 0; }
        .condition { text-transform: uppercase; font-size: 13px; letter-spacing: 4px; opacity: 0.9; }

        .details {
            display: flex;
            justify-content: space-around;
            margin-top: 35px;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 20px;
        }

        .footer {
            margin-top: 30px;
            font-size: 11px;
            letter-spacing: 2px;
            opacity: 0.8;
        }

        .dev-name {
            color: #00f2fe;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0, 242, 254, 0.6);
            animation: pulse 2.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
            100% { opacity: 0.5; transform: scale(1); }
        }
    </style>
</head>
<body>

<div class="weather-card">
    <div class="search-box">
        <input type="text" id="cityInput" placeholder="Enter city name..." onkeypress="handleSearch(event)">
    </div>

    <div class="city" id="cityName">READY</div>
    <div class="condition" id="status">Type city & press enter</div>
    <div class="temp"><span id="tempVal">--</span>°</div>

    <div class="details">
        <div class="info-node">
            <p style="font-size: 10px; opacity: 0.6; margin-bottom: 5px;">HUMIDITY</p>
            <h3 id="hum">--%</h3>
        </div>
        <div class="info-node">
            <p style="font-size: 10px; opacity: 0.6; margin-bottom: 5px;">WIND</p>
            <h3 id="wind">-- km/h</h3>
        </div>
    </div>

    <div class="footer">
        POWERED BY <br>
        <span class="dev-name">DIVINE WISDOM</span>
    </div>
</div>

<script>
    // CRITICAL: Replace the text inside these quotes with your actual API Key!
    const apiKey = "PASTE_YOUR_API_KEY_HERE"; 

    async function updateWeather(city) {
        const cityNameEl = document.getElementById('cityName');
        const tempEl = document.getElementById('tempVal');
        const statusEl = document.getElementById('status');
        const humEl = document.getElementById('hum');
        const windEl = document.getElementById('wind');

        cityNameEl.innerText = "LOADING...";

        try {
            const response = await fetch(
                `https://api.openweathermap.org/data/2.5/weather?q=${city}&units=metric&appid=${apiKey}`
            );

            if (!response.ok) throw new Error("City not found");
            const data = await response.json();

            cityNameEl.innerText = data.name;
            tempEl.innerText = Math.round(data.main.temp);
            statusEl.innerText = data.weather[0].description;
            humEl.innerText = data.main.humidity + "%";
            windEl.innerText = Math.round(data.wind.speed * 3.6) + " km/h";

            // Color shift based on weather
            const temp = data.main.temp;
            if (temp > 28) document.body.style.background = "linear-gradient(to bottom, #ff4b1f, #ff9068)";
            else if (temp < 15) document.body.style.background = "linear-gradient(to bottom, #2c3e50, #000000)";
            else document.body.style.background = "linear-gradient(to bottom, #4facfe, #00f2fe)";

        } catch (error) {
            cityNameEl.innerText = "ERROR";
            statusEl.innerText = "INVALID CITY OR API KEY";
        }
    }

    function handleSearch(event) {
        if (event.key === "Enter") {
            let city = document.getElementById('cityInput').value;
            if (city.trim() !== "") updateWeather(city);
        }
    }
</script>

</body>
</html>
