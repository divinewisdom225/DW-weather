<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyCast by Divine Wisdom</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #1a1a2e;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: sans-serif;
            color: white;
        }
        .weather-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 90%;
            max-width: 400px;
            padding: 30px;
            border-radius: 30px;
            text-align: center;
        }
        .search-box {
            background: rgba(0,0,0,0.2);
            border-radius: 50px;
            padding: 5px 15px;
            margin-bottom: 20px;
            display: flex;
        }
        input {
            background: transparent;
            border: none;
            outline: none;
            color: white;
            padding: 10px;
            width: 100%;
            font-size: 16px;
        }
        .temp { font-size: 80px; font-weight: 100; }
        .city { font-size: 24px; margin-bottom: 10px; }
        .footer { margin-top: 20px; font-size: 12px; color: #00f2fe; font-weight: bold; }
    </style>
</head>
<body>

<div class="weather-card">
    <div class="search-box">
        <input type="text" id="cityInput" placeholder="Enter city..." onkeypress="handleSearch(event)">
    </div>
    <div class="city" id="cityName">READY</div>
    <div id="status">Enter city name</div>
    <div class="temp"><span id="tempVal">--</span>°C</div>
    <div class="footer">POWERED BY DIVINE WISDOM</div>
</div>

<script>
    // ⚠️ CRITICAL: PASTE YOUR API KEY BETWEEN THE QUOTES BELOW
    const apiKey = "PASTE_YOUR_KEY_HERE"; 

    async function updateWeather(city) {
        const cityNameEl = document.getElementById('cityName');
        const tempEl = document.getElementById('tempVal');
        const statusEl = document.getElementById('status');
        cityNameEl.innerText = "LOADING...";
        try {
            const response = await fetch(
                `https://api.openweathermap.org/data/2.5/weather?q=${city}&units=metric&appid=${apiKey}`
            );
            if (!response.ok) throw new Error();
            const data = await response.json();
            cityNameEl.innerText = data.name;
            tempEl.innerText = Math.round(data.main.temp);
            statusEl.innerText = data.weather[0].description;
        } catch (e) {
            cityNameEl.innerText = "ERROR";
            statusEl.innerText = "Check City or API Key";
        }
    }
    function handleSearch(event) {
        if (event.key === "Enter") {
            let city = document.getElementById('cityInput').value;
            if (city.trim() !== "") updateWeather(city);
        }
    }
</script>
</body>
</html>
