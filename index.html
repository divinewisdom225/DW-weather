<!DOCTYPE html> 
<html> 
<head> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>DW Weather & Cam</title> 
    <style> 
        * { margin: 0; padding: 0; box-sizing: border-box; } 
        body { background: #000; color: white; font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif; overflow: hidden; height: 100vh; } 
        
        /* Full Screen Webcam */ 
        #webcam { 
            position: fixed; 
            right: 0; bottom: 0; 
            min-width: 100%; min-height: 100%; 
            z-index: -1; 
            object-fit: cover; 
        } 
        .overlay { height: 100vh; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.5); } 
        
        /* Google Weather Inspired Glass Card */ 
        .weather-card { 
            background: rgba(30, 31, 32, 0.85); 
            backdrop-filter: blur(20px); 
            padding: 24px; 
            border-radius: 28px; 
            width: 92%; 
            max-width: 420px; 
            border: 1px solid rgba(255,255,255,0.08); 
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5); 
        } 
        
        /* Input & Clock Header */
        .card-header { display: flex; flex-direction: column; align-items: center; margin-bottom: 16px; }
        #clock { font-size: 1.2rem; color: #00f2fe; font-weight: 600; margin-bottom: 10px; } 
        input { width: 100%; padding: 10px 18px; border-radius: 50px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: white; text-align: center; font-size: 14px; outline: none; transition: all 0.3s ease; }
        input:focus { background: rgba(255,255,255,0.1); border-color: #00f2fe; }
        
        /* Error message styling */
        .error-message { font-size: 12px; color: #ff6b6b; text-align: center; margin-top: 8px; }

        /* Location Subtitle */
        .location-sub { font-size: 15px; color: #c4c7c5; margin-bottom: 12px; text-align: left; font-weight: 500; }

        /* Main Temperature Block */
        .main-weather-row { display: flex; align-items: center; justify-content: flex-start; gap: 15px; margin-bottom: 8px; }
        .weather-icon-main { font-size: 55px; line-height: 1; }
        .temp-display { font-size: 64px; font-weight: 400; display: flex; align-items: flex-start; } 
        .temp-unit { font-size: 24px; margin-left: 4px; margin-top: 8px; color: #e3e3e3; }

        /* Condition Text */
        .condition-title { font-size: 22px; font-weight: 400; text-align: left; margin-bottom: 4px; color: #fff; }
        .hi-low-text { font-size: 14px; color: #c4c7c5; text-align: left; margin-bottom: 20px; }

        /* Navigation Pills */
        .pills-row { display: flex; gap: 8px; margin-bottom: 24px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 16px; }
        .pill { padding: 8px 16px; border-radius: 20px; font-size: 14px; font-weight: 500; background: transparent; color: #e3e3e3; border: none; cursor: pointer; transition: all 0.3s ease; }
        .pill.active { background: #004a77; color: #c2e7ff; }

        /* Hourly Forecast Grid */
        .hourly-forecast { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .hourly-item { display: flex; flex-direction: column; align-items: center; width: 22%; }
        .hourly-time { font-size: 13px; color: #e3e3e3; margin-bottom: 8px; font-weight: 500; }
        .hourly-icon { font-size: 24px; margin-bottom: 4px; }
        .hourly-pop { font-size: 11px; color: #7cb3f9; font-weight: 600; margin-bottom: 6px; }
        .hourly-temp { font-size: 14px; color: #fff; font-weight: 500; }

        /* Auto-refresh indicator */ 
        .refresh-label { font-size: 10px; color: #8e918f; text-align: center; margin-top: 15px; } 

        /* Responsive Design */
        @media (max-width: 480px) {
            .weather-card { width: 95%; max-width: 100%; padding: 16px; }
            .temp-display { font-size: 48px; }
            .weather-icon-main { font-size: 40px; }
            .condition-title { font-size: 18px; }
        }
    </style> 
</head> 
<body> 
    <video id="webcam" autoplay playsinline muted></video> 
    <div class="overlay"> 
        <div class="weather-card"> 
            <div class="card-header">
                <div id="clock">00:00:00</div> 
                <label for="cityInput" style="display:none;">Search city</label>
                <input type="text" id="cityInput" placeholder="Search city..." onkeypress="handleSearch(event)" aria-label="Search for a city"> 
                <div id="errorMsg" class="error-message"></div>
            </div>

            <div id="locationHeader" class="location-sub">Enter a city to begin</div>
            
            <div class="main-weather-row">
                <div id="mainIcon" class="weather-icon-main">☁️</div>
                <div class="temp-display"><span id="tempVal">--</span><span class="temp-unit">°C</span></div>
            </div>
            
            <div id="status" class="condition-title">READY</div> 
            <div id="hiLow" class="hi-low-text">High: --° Low: --°</div>

            <div class="pills-row">
                <button class="pill active" onclick="toggleForecast(0)">Temperature</button>
                <button class="pill" onclick="toggleForecast(1)">Precipitation</button>
                <button class="pill" onclick="toggleForecast(2)">Wind</button>
            </div>

            <div id="hourlyContainer" class="hourly-forecast">
                <div class="hourly-item"><span class="hourly-time">--</span><span class="hourly-icon">▪️</span><span class="hourly-pop">0%</span><span class="hourly-temp">--°</span></div>
                <div class="hourly-item"><span class="hourly-time">--</span><span class="hourly-icon">▪️</span><span class="hourly-pop">0%</span><span class="hourly-temp">--°</span></div>
                <div class="hourly-item"><span class="hourly-time">--</span><span class="hourly-icon">▪️</span><span class="hourly-pop">0%</span><span class="hourly-temp">--°</span></div>
                <div class="hourly-item"><span class="hourly-time">--</span><span class="hourly-icon">▪️</span><span class="hourly-pop">0%</span><span class="hourly-temp">--°</span></div>
            </div>
            
            <p id="refreshLabel" class="refresh-label"></p> 
        </div> 
    </div> 
<script> 
    // API key from OpenWeatherMap
    const apiKey = "848170642605f343e1b3dab28d95fc03";
    
    const REFRESH_INTERVAL_MS = 5 * 60 * 1000; // 5 minute auto-refresh loop
    let lastCity = ""; 
    let refreshTimer = null; 
    let forecastData = null;
    let currentForecastTab = 0; // 0 = Temperature, 1 = Precipitation, 2 = Wind

    // Comprehensive weather emoji mapping
    function getWeatherEmoji(condition, iconCode) {
        // Use OpenWeather icon codes for more accuracy
        if (iconCode) {
            const code = iconCode.substring(0, 2);
            const d = iconCode.charAt(2) === 'd' ? 'day' : 'night';
            
            if (code === '01') return d === 'day' ? '☀️' : '🌙';
            if (code === '02') return d === 'day' ? '🌤️' : '🌥️';
            if (code === '03') return '☁️';
            if (code === '04') return '☁️';
            if (code === '09') return '🌧️';
            if (code === '10') return '🌦️';
            if (code === '11') return '⛈️';
            if (code === '13') return '❄️';
            if (code === '50') return '🌫️';
        }

        // Fallback to condition text
        if (condition === "Thunderstorm") return "⛈️";
        if (condition === "Rain" || condition === "Drizzle") return "🌧️";
        if (condition === "Clouds") return "☁️";
        if (condition === "Clear") return "☀️";
        if (condition === "Snow") return "❄️";
        if (condition === "Mist" || condition === "Smoke" || condition === "Haze" || condition === "Dust" || condition === "Fog" || condition === "Sand" || condition === "Ash" || condition === "Squall" || condition === "Tornado") return "🌫️";
        return "☀️";
    }

    // 1. TIMING LOGIC 
    function updateTime() { 
        const now = new Date(); 
        document.getElementById('clock').innerText = now.toLocaleTimeString(); 
    } 
    setInterval(updateTime, 1000); 
    updateTime(); 

    // 2. WEBCAM CAPTURE INTERFACE
    async function startCamera() { 
        try { 
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } }); 
            document.getElementById('webcam').srcObject = stream; 
        } catch (err) { 
            console.warn("Camera access denied or not available:", err.message); 
        } 
    } 
    startCamera(); 

    // 3. CORE PROCESSING LOGIC
    async function updateWeather(city) { 
        const status = document.getElementById('status'); 
        const errorEl = document.getElementById('errorMsg');
        errorEl.innerText = "";
        status.innerText = "FETCHING..."; 
        
        if (!city || city.trim().length === 0) {
            errorEl.innerText = "❌ Please enter a valid city name";
            status.innerText = "READY";
            return;
        }
        
        try {
            if (!apiKey || apiKey.length === 0) {
                throw new Error("API key not configured");
            }
            
            // Fetch current weather
            const currentResponse = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(city)}&units=metric&appid=${apiKey}&_=${new Date().getTime()}`); 
            if (!currentResponse.ok) {
                throw new Error(`City not found or API error: ${currentResponse.status}`);
            }
            const currentData = await currentResponse.json(); 
            
            // Build dynamic header
            const currentDayName = new Date().toLocaleDateString('en-US', { weekday: 'long' });
            document.getElementById('locationHeader').innerText = `${currentDayName} • ${currentData.name}`; 
            
            // Set main temperatures
            document.getElementById('tempVal').innerText = Math.round(currentData.main.temp); 
            document.getElementById('hiLow').innerText = `High: ${Math.round(currentData.main.temp_max)}° Low: ${Math.round(currentData.main.temp_min)}°`;

            const mainCondition = currentData.weather[0].main;
            const mainIcon = currentData.weather[0].icon;
            const description = currentData.weather[0].description;
            const iconEl = document.getElementById('mainIcon');

            // Set condition text
            if (mainCondition === "Thunderstorm") {
                status.innerText = "Thunderstorm";
            } else if (mainCondition === "Rain" || mainCondition === "Drizzle") {
                status.innerText = "Rain";
            } else if (mainCondition === "Clouds") {
                status.innerText = description.charAt(0).toUpperCase() + description.slice(1);
            } else if (mainCondition === "Clear") {
                status.innerText = "Clear";
            } else if (mainCondition === "Snow") {
                status.innerText = "Snow";
            } else {
                status.innerText = mainCondition;
            }
            
            // Set emoji with icon code
            iconEl.innerText = getWeatherEmoji(mainCondition, mainIcon);

            // Fetch forecast data
            const forecastResponse = await fetch(`https://api.openweathermap.org/data/2.5/forecast?q=${encodeURIComponent(city)}&units=metric&appid=${apiKey}&_=${new Date().getTime()}`);
            if (forecastResponse.ok) {
                forecastData = await forecastResponse.json();
                displayForecast(currentForecastTab);
            } else {
                console.error("Forecast API error:", forecastResponse.status);
            }

            status.innerText = mainCondition;
        } catch (e) { 
            status.innerText = "ERROR"; 
            errorEl.innerText = `❌ ${e.message}`;
            console.error("Weather update error:", e);
        } 
    } 

    // Display forecast based on selected tab
    function displayForecast(tab) {
        currentForecastTab = tab;
        
        if (!forecastData) return;

        const hourlyContainer = document.getElementById('hourlyContainer');
        hourlyContainer.innerHTML = "";

        const forecastCount = Math.min(4, forecastData.list.length);
        
        for (let i = 0; i < forecastCount; i++) {
            const block = forecastData.list[i];
            const futureTime = new Date(block.dt * 1000).toLocaleTimeString('en-US', { hour: 'numeric', hour12: true });
            const futureTemp = Math.round(block.main.temp);
            const futureCond = block.weather[0].main;
            const futureIcon = block.weather[0].icon;
            const windSpeed = Math.round(block.wind.speed);
            const rainProbability = block.pop ? Math.round(block.pop * 100) : 0;

            let displayValue = "";
            let unit = "";

            if (tab === 0) { // Temperature
                displayValue = futureTemp;
                unit = "°";
            } else if (tab === 1) { // Precipitation
                displayValue = rainProbability;
                unit = "%";
            } else if (tab === 2) { // Wind
                displayValue = windSpeed;
                unit = "m/s";
            }

            const itemHTML = `
                <div class="hourly-item">
                    <span class="hourly-time">${futureTime}</span>
                    <span class="hourly-icon">${getWeatherEmoji(futureCond, futureIcon)}</span>
                    <span class="hourly-pop">${displayValue}${unit}</span>
                    <span class="hourly-temp">${futureCond}</span>
                </div>
            `;
            hourlyContainer.innerHTML += itemHTML;
        }

        // Update pill buttons
        document.querySelectorAll('.pill').forEach((pill, index) => {
            pill.classList.remove('active');
            if (index === tab) pill.classList.add('active');
        });
    }

    function toggleForecast(tab) {
        displayForecast(tab);
    }

    // 4. AUTOMATED MAINTENANCE TIMER
    function startAutoRefresh(city) { 
        clearInterval(refreshTimer); 
        refreshTimer = setInterval(() => { 
            if (lastCity) updateWeather(lastCity); 
        }, REFRESH_INTERVAL_MS); 
    } 

    function handleSearch(event) { 
        if (event.key === "Enter") { 
            const city = document.getElementById('cityInput').value.trim(); 
            if (city !== "") { 
                lastCity = city; 
                updateWeather(city); 
                startAutoRefresh(city); 
            } else {
                document.getElementById('errorMsg').innerText = "❌ Please enter a city name";
            }
        } 
    } 
</script> 
</body> 
</html>
