<script>
const apiKey = "YOUR_REAL_API_KEY_HERE";

async function updateWeather(city){

    const cityNameEl = document.getElementById("cityName");
    const tempEl = document.getElementById("tempVal");
    const statusEl = document.getElementById("status");
    const humEl = document.getElementById("hum");
    const windEl = document.getElementById("wind");
    const iconEl = document.getElementById("weatherIcon");

    cityNameEl.innerHTML = "⏳ LOADING...";

    try{

        const response = await fetch(
        `https://api.openweathermap.org/data/2.5/weather?q=${city}&units=metric&appid=${apiKey}`
        );

        if(!response.ok) throw new Error("City not found");

        const data = await response.json();

        cityNameEl.innerText = data.name;
        tempEl.innerText = Math.round(data.main.temp);
        statusEl.innerText = data.weather[0].description;
        humEl.innerText = data.main.humidity + "%";
        windEl.innerText = Math.round(data.wind.speed * 3.6) + " km/h";

        const icon = data.weather[0].icon;
        iconEl.src = `https://openweathermap.org/img/wn/${icon}@2x.png`;

    }
    catch(error){
        cityNameEl.innerText = "ERROR";
        statusEl.innerText = "Check API key or city name";
        tempEl.innerText = "--";
        humEl.innerText = "--%";
        windEl.innerText = "-- km/h";
        iconEl.src = "";
    }
}

/* Enter key search */
function handleSearch(event){
    if(event.key === "Enter"){
        const city = document.getElementById("cityInput").value;
        if(city.trim()) updateWeather(city);
    }
}

/* Auto load location weather */
window.onload = () => {
    if(navigator.geolocation){
        navigator.geolocation.getCurrentPosition(async (pos) => {

            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;

            const res = await fetch(
            `https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&units=metric&appid=${apiKey}`
            );

            const data = await res.json();
            updateWeather(data.name);

        }, () => {
            updateWeather("London");
        });
    } else {
        updateWeather("London");
    }
};
</script>
